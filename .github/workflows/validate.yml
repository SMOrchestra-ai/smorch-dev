name: Validate Plugins

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Make validate-plugins.sh executable
        run: chmod +x scripts/validate-plugins.sh
      - name: Run plugin validation
        run: bash scripts/validate-plugins.sh
